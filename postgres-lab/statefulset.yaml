apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: postgres-lab
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template: 
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16
        envFrom:
          - secretRef:
              name: postgres-credentials
        env:
          - name: PGDATA
            value: /var/lib/postgresql/data/pgdata
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 250m
            memory: 256Mi
        volumeMounts:
          - name: data
            mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        storageClassName: postgres-storage
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi